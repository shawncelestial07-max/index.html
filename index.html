<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 8px; width: 400px; margin-right: 10px; }
    button { padding: 8px 12px; }
    #status { margin-top: 10px; font-weight: bold; color: green; }
    #error { margin-top: 10px; font-weight: bold; color: red; }
  </style>
</head>
<body>
  <h1>Employee Tracker</h1>

  <!-- Single input for all employee info -->
  <form id="employee-form">
    <input type="text" id="employeeData" placeholder="Paste info: Name, Address, State, SSN" required>
    <button type="submit">Add Employee</button>
  </form>

  <div id="status"></div>
  <div id="error"></div>

  <script>
    const form = document.getElementById('employee-form');
    const input = document.getElementById('employeeData');
    const status = document.getElementById('status');
    const error = document.getElementById('error');

    form.addEventListener('submit', function(e){
      e.preventDefault();
      const data = input.value.trim();
      if(!data){
        error.textContent = "Please enter employee info.";
        return;
      }

      // Replace YOUR_WEB_APP_URL_HERE with your deployed Google Apps Script Web App URL
      fetch("YOUR_WEB_APP_URL_HERE", {
        method: "POST",
        body: JSON.stringify({ data: data }),
        headers: { "Content-Type": "application/json" }
      })
      .then(response => response.text())
      .then(msg => {
        if(msg.includes("Success")){
          status.textContent = "Employee added successfully! Check your Google Sheet.";
          error.textContent = "";
          input.value = "";
        } else {
          error.textContent = msg;
          status.textContent = "";
        }
      })
      .catch(err => {
        error.textContent = "Error submitting data. Check your Web App URL and deployment.";
        status.textContent = "";
        console.error(err);
      });
    });
  </script>
</body>
</html>
