<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 8px; width: 400px; margin-right: 10px; }
    button { padding: 8px 12px; }
    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Employee Tracker</h1>

  <form id="employee-form">
    <input type="text" id="employeeData" placeholder="Paste info: Name, Address, State, SSN" required>
    <button type="submit">Add Employee</button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById('employee-form');
    const input = document.getElementById('employeeData');
    const status = document.getElementById('status');

    form.addEventListener('submit', function(e){
      e.preventDefault();
      const data = input.value.trim();
      if(!data) return;

      fetch("YOUR_WEB_APP_URL_HERE", {
        method: "POST",
        body: JSON.stringify({data: data}),
        headers: { "Content-Type": "application/json" }
      })
      .then(response => response.text())
      .then(msg => {
        status.textContent = "Submitted! Check your Google Sheet.";
        input.value = "";
      })
      .catch(err => {
        status.textContent = "Error submitting data.";
        console.error(err);
      });
    });
  </script>
</body>
</html>
